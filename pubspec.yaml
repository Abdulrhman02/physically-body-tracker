name: physically
description: Physically body composition tracker with InBody import and LLM prompt export.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: ">=3.19.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  sqflite: ^2.3.3+1
  path_provider: ^2.1.3
  path: ^1.9.0
  shared_preferences: ^2.2.3
  csv: ^6.0.0
  file_picker: ^8.0.6
  fl_chart: ^0.68.0
  intl: ^0.19.0
  share_plus: ^9.0.0
  http: ^1.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
